<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go out with me? ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffecd2 100%);
            overflow: hidden;
            user-select: none;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 92vw;
            width: 460px;
            position: relative;
            transition: all 0.5s ease;
        }
        h1 {
            font-size: 1.8rem;
            color: #e74c3c;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        h2 {
            font-size: 1.4rem;
            color: #e74c3c;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 2rem;
            min-height: 60px;
            position: relative;
        }
        .btn {
            padding: 0.9rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .btn-yes {
            background: #e74c3c;
            color: white;
            box-shadow: 0 4px 15px rgba(231,76,60,0.4);
        }
        .btn-yes:hover {
            background: #c0392b;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(231,76,60,0.5);
        }
        .btn-no {
            background: #95a5a6;
            color: white;
            transition: left 0.15s ease, top 0.15s ease;
            touch-action: none;
            z-index: 10;
        }
        .btn-no:hover {
            background: #7f8c8d;
        }
        .heart {
            display: inline-block;
            animation: heartbeat 0.6s infinite alternate;
        }
        @keyframes heartbeat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }
        .date-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin: 1.2rem 0;
        }
        .date-btn {
            padding: 0.7rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 600;
            border: 2px solid #e74c3c;
            background: white;
            color: #e74c3c;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .date-btn:hover {
            background: #e74c3c;
            color: white;
            transform: scale(1.05);
        }
        .date-btn.selected {
            background: #e74c3c;
            color: white;
        }
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .day-input {
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            width: 220px;
            max-width: 100%;
            margin-top: 0.3rem;
            color: #2c3e50;
        }
        .day-input:focus {
            border-color: #e74c3c;
        }
        .done-message {
            font-size: 1.3rem;
            color: #e74c3c;
            font-weight: 600;
            margin-top: 0.8rem;
            line-height: 1.5;
        }
        .emoji-big {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }
        .step-gif {
            max-width: 180px;
            max-height: 180px;
            border-radius: 1rem;
            margin-bottom: 0.8rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
            object-fit: cover;
        }
        p {
            color: #2c3e50;
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
        }
        .mt-1 {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Step 1: Ask out -->
        <div class="step active" id="step1">
            <img src="LOVE.gif" alt="Love" class="step-gif" onerror="this.style.display='none'">
            <h1>
                <span class="heart">❤️</span>
                Will you go out with me?
                <span class="heart">❤️</span>
            </h1>
            <div class="btn-group">
                <button class="btn btn-yes" id="btnYes">Yes ❤️</button>
                <button class="btn btn-no" id="btnNo">No 💔</button>
            </div>
        </div>

        <!-- Step 2: Pick a date -->
        <div class="step" id="step2">
            <img src="yes.gif" alt="Yes!" class="step-gif" onerror="this.style.display='none'">
            <h2>Yay! You said yes! 🥰</h2>
            <p>Pick a date:</p>
            <input type="date" class="day-input" id="dayInput">
            <br>
            <button class="btn btn-yes mt-1" id="btnNext">Next →</button>
        </div>

        <!-- Step 3: Choose activity -->
        <div class="step" id="step3">
            <img src="date.gif" alt="Date" class="step-gif" onerror="this.style.display='none'">
            <h2>So it's <span id="displayDate"></span>! 🎉</h2>
            <p>Now pick what we should do:</p>
            <div class="date-options" id="dateOptions">
                <button class="date-btn" data-value="movies">🎬 Movies</button>
                <button class="date-btn" data-value="dinner">🍝 Dinner</button>
                <button class="date-btn" data-value="beach">🏖️ Beach</button>
                <button class="date-btn" data-value="clubbing">💃 Clubbing</button>
                <button class="date-btn" data-value="games">🎮 Games</button>
            </div>
        </div>

        <!-- Step 4: Final confirmation -->
        <div class="step" id="step4">
            <img src="pickup.gif" alt="Confirmed!" class="step-gif" onerror="this.style.display='none'">
            <div class="emoji-big">💖</div>
            <h2>It's a date! 🎊</h2>
            <div class="done-message" id="finalMessage"></div>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const step4 = document.getElementById('step4');
        const dayInput = document.getElementById('dayInput');
        const btnNext = document.getElementById('btnNext');
        const displayDate = document.getElementById('displayDate');
        const finalMessage = document.getElementById('finalMessage');
        const dateOptions = document.getElementById('dateOptions');
        const confettiContainer = document.getElementById('confettiContainer');

        // ──────────────────────────────────────────────
        // EmailJS Configuration — replace with your own
        // ──────────────────────────────────────────────
        // 1. Sign up at https://www.emailjs.com (free)
        // 2. Connect an email service (Gmail, Outlook, etc.)
        // 3. Create an email template with variables: {{date}}, {{activity}}, {{activity_label}}
        // 4. Copy your keys below
        const EMAILJS_CONFIG = {
            publicKey: 'jGMnQ7oHpMqfhqFVp',       // from EmailJS Account > API Keys
            serviceID: 'service_lc7d8qj',        // from EmailJS > Email Services
            templateID: 'template_ad6kv9e',      // from EmailJS > Email Templates
        };

        function sendEmail(date, activity, activityLabel) {
            if (EMAILJS_CONFIG.publicKey.includes('YOUR_')) return; // not configured yet
            emailjs.init(EMAILJS_CONFIG.publicKey);
            emailjs.send(EMAILJS_CONFIG.serviceID, EMAILJS_CONFIG.templateID, {
                date: date,
                activity: activity,
                activity_label: activityLabel,
            }).then(function(response) {
                console.log('Email sent!', response.status, response.text);
            }, function(error) {
                console.log('Email failed...', error);
            });
        }

        // --- Set default date to today ---
        const today = new Date().toISOString().split('T')[0];
        dayInput.value = today;
        dayInput.min = today;

        // --- Moving No button ---
        function getViewportBounds() {
            const padding = 10;
            return {
                minX: padding,
                minY: padding,
                maxX: window.innerWidth - btnNo.offsetWidth - padding,
                maxY: window.innerHeight - btnNo.offsetHeight - padding,
            };
        }

        function isNearCenter(vpX, vpY) {
            const cx = window.innerWidth / 2 - btnNo.offsetWidth / 2;
            const cy = window.innerHeight / 2 - btnNo.offsetHeight / 2;
            return Math.sqrt((vpX - cx) ** 2 + (vpY - cy) ** 2) < 100;
        }

        function moveNoButton() {
            btnNo.style.position = 'fixed';
            const bounds = getViewportBounds();
            let newX, newY;
            let attempts = 0;
            do {
                newX = Math.random() * Math.max(0, bounds.maxX - bounds.minX) + bounds.minX;
                newY = Math.random() * Math.max(0, bounds.maxY - bounds.minY) + bounds.minY;
                attempts++;
            } while (attempts < 20 && isNearCenter(newX, newY));
            newX = Math.max(bounds.minX, Math.min(newX, bounds.maxX));
            newY = Math.max(bounds.minY, Math.min(newY, bounds.maxY));
            btnNo.style.left = newX + 'px';
            btnNo.style.top = newY + 'px';
        }

        btnNo.addEventListener('mouseover', function(e) {
            moveNoButton();
        });

        btnNo.addEventListener('touchstart', function(e) {
            e.preventDefault();
            moveNoButton();
        });

        document.addEventListener('mousemove', function(e) {
            if (step1.classList.contains('active')) {
                const noRect = btnNo.getBoundingClientRect();
                const distX = e.clientX - (noRect.left + noRect.width / 2);
                const distY = e.clientY - (noRect.top + noRect.height / 2);
                const dist = Math.sqrt(distX ** 2 + distY ** 2);
                if (dist < 120) {
                    moveNoButton();
                }
            }
        });

        // --- Yes button → Step 2 ---
        btnYes.addEventListener('click', function() {
            step1.classList.remove('active');
            step2.classList.add('active');
            dayInput.focus();
            launchConfetti(50);
        });

        // --- Next button → Step 3 ---
        btnNext.addEventListener('click', function() {
            const day = dayInput.value;
            if (!day) {
                dayInput.style.borderColor = '#e74c3c';
                dayInput.focus();
                return;
            }
            dayInput.style.borderColor = '#ddd';
            const d = new Date(day + 'T00:00:00');
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            displayDate.textContent = d.toLocaleDateString('en-US', options);
            step2.classList.remove('active');
            step3.classList.add('active');
            launchConfetti(30);
        });

        dayInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') btnNext.click();
        });

        // --- Date options → Step 4 ---
        let selectedDate = null;
        const dateBtns = dateOptions.querySelectorAll('.date-btn');

        dateBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                dateBtns.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedDate = this.dataset.value;
                const label = this.textContent.trim();
                step3.classList.remove('active');
                step4.classList.add('active');
                finalMessage.innerHTML = `Can't wait for our ${label} date on <strong>${displayDate.textContent}</strong>! 💕<br>See you then! 😘`;
                launchConfetti(100);
                createFloatingHearts();
                sendEmail(displayDate.textContent, selectedDate, label);
            });
        });

        // --- Confetti ---
        function launchConfetti(count) {
            const colors = ['#e74c3c', '#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#e91e63', '#ff6b6b', '#ffd93d', '#6bcb77'];
            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                const color = colors[Math.floor(Math.random() * colors.length)];
                const borderRadius = Math.random() > 0.5 ? '50%' : '0';
                const width = Math.random() * 8 + 5;
                const height = Math.random() * 8 + 5;
                Object.assign(piece.style, {
                    left: Math.random() * 100 + '%',
                    width: width + 'px',
                    height: height + 'px',
                    background: color,
                    borderRadius: borderRadius,
                    animationDuration: Math.random() * 2 + 1.5 + 's',
                    animationDelay: Math.random() * 0.5 + 's',
                });
                confettiContainer.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }

        // --- Floating hearts ---
        function createFloatingHearts() {
            const emojis = ['❤️', '💖', '💕', '💗', '💓'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                Object.assign(heart.style, {
                    position: 'fixed',
                    left: Math.random() * 100 + '%',
                    bottom: '-50px',
                    fontSize: (Math.random() * 22 + 16) + 'px',
                    pointerEvents: 'none',
                    zIndex: '101',
                    animation: `floatUp ${Math.random() * 3 + 3}s linear forwards`,
                    opacity: '0.85',
                });
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }
        }

        // Add float up animation
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes floatUp {
                0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.9; }
                50% { transform: translateY(-50vh) translateX(${Math.random() > 0.5 ? '' : '-'}30px) rotate(10deg); opacity: 0.7; }
                100% { transform: translateY(-100vh) translateX(${Math.random() > 0.5 ? '' : '-'}60px) rotate(-10deg); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
